<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tracker de Leitura - Múltiplos Livros</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#1a202c">
    <style>
        :root {
            --primary: #f6ad55; /* Laranja remetendo à luz */
            --bg-glass: rgba(26, 32, 44, 0.85);
            --text: #e2e8f0;
            --danger: #e53e3e;
        }

        body {
            margin: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: url('https://static.vecteezy.com/system/resources/previews/071/820/601/large_2x/open-book-radiates-warm-light-illuminating-pages-with-magical-glow-on-a-wooden-table-symbolizing-knowledge-and-inspiration-photo.jpg') no-repeat center center fixed;
            background-size: cover;
            color: var(--text);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
            box-sizing: border-box;
        }

        .container {
            background: var(--bg-glass);
            backdrop-filter: blur(10px);
            padding: 2rem;
            border-radius: 12px;
            width: 100%;
            max-width: 500px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.5);
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-sizing: border-box;
        }

        h1, h2, h3 { text-align: center; margin-top: 0; }
        
        .hidden { display: none !important; }

        /* Formulário de Setup */
        .form-group { margin-bottom: 1.5rem; }
        label { display: block; margin-bottom: 0.5rem; font-weight: bold; }
        
        .radio-group { display: flex; gap: 1rem; }
        .radio-group label {
            flex: 1;
            background: rgba(255, 255, 255, 0.1);
            padding: 1rem;
            text-align: center;
            border-radius: 8px;
            cursor: pointer;
            border: 2px solid transparent;
            transition: all 0.3s;
        }
        .radio-group input { display: none; }
        .radio-group input:checked + label {
            border-color: var(--primary);
            background: rgba(246, 173, 85, 0.2);
            color: var(--primary);
        }

        input[type="number"], input[type="text"], select {
            width: 100%;
            padding: 0.8rem;
            border-radius: 8px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            background: rgba(0, 0, 0, 0.3);
            color: white;
            box-sizing: border-box;
            font-size: 1rem;
            margin-bottom: 10px;
        }

        button {
            width: 100%;
            padding: 1rem;
            background-color: var(--primary);
            color: #1a202c;
            border: none;
            border-radius: 8px;
            font-size: 1.1rem;
            font-weight: bold;
            cursor: pointer;
            transition: opacity 0.3s;
            margin-bottom: 0.5rem;
        }
        button:hover { opacity: 0.9; }
        button.secondary { background-color: rgba(255, 255, 255, 0.2); color: white; }
        button.danger { background-color: var(--danger); color: white; }

        /* Dashboard - Lista de Livros */
        .livros-lista {
            max-height: 380px;
            overflow-y: auto;
            margin-bottom: 1.5rem;
            padding-right: 5px;
        }
        .livros-lista::-webkit-scrollbar { width: 6px; }
        .livros-lista::-webkit-scrollbar-thumb { background: rgba(255, 255, 255, 0.3); border-radius: 3px; }

        .book-item {
            background: rgba(255, 255, 255, 0.05);
            padding: 1.2rem;
            border-radius: 8px;
            margin-bottom: 0.8rem;
            border-left: 4px solid var(--primary);
        }
        .book-info {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 0.8rem;
        }
        .book-title { font-weight: bold; font-size: 1.1rem; word-break: break-word; }
        .book-meta { font-size: 0.85rem; opacity: 0.7; white-space: nowrap; }
        
        .book-actions {
            display: flex;
            gap: 0.5rem;
        }
        .book-actions button {
            padding: 0.6rem;
            font-size: 0.95rem;
            margin-bottom: 0;
        }

        /* Tela de Tracker Individual */
        .progress-header {
            text-align: center;
            margin-bottom: 1.5rem;
            font-size: 1.2rem;
        }
        .progress-bar {
            width: 100%;
            height: 10px;
            background: rgba(255, 255, 255, 0.2);
            border-radius: 5px;
            margin-bottom: 1.5rem;
            overflow: hidden;
        }
        .progress-fill {
            height: 100%;
            background: var(--primary);
            width: 0%;
            transition: width 0.3s ease;
        }

        .checklist {
            max-height: 320px;
            overflow-y: auto;
            padding-right: 5px;
            margin-bottom: 1.5rem;
        }
        .checklist::-webkit-scrollbar { width: 6px; }
        .checklist::-webkit-scrollbar-thumb { background: rgba(255, 255, 255, 0.3); border-radius: 3px; }

        .day-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 1rem;
            background: rgba(255, 255, 255, 0.05);
            margin-bottom: 0.5rem;
            border-radius: 8px;
            cursor: pointer;
            border-left: 4px solid transparent;
            transition: all 0.2s;
        }
        .day-item:hover { background: rgba(255, 255, 255, 0.1); }
        .day-item.done {
            border-left-color: var(--primary);
            background: rgba(246, 173, 85, 0.1);
            opacity: 0.8;
        }
        .day-item.done span { text-decoration: line-through; }
        
        .checkbox {
            width: 24px;
            height: 24px;
            border: 2px solid var(--text);
            border-radius: 4px;
            display: flex;
            justify-content: center;
            align-items: center;
            box-sizing: border-box;
        }
        .day-item.done .checkbox::after {
            content: '✔';
            color: var(--primary);
            font-size: 1.2rem;
        }
        
        .no-books {
            text-align: center;
            opacity: 0.6;
            padding: 2.5rem 0;
            font-style: italic;
        }
    </style>
</head>
<body>

    <div class="container" id="lista-screen">
        <h1>Minha Biblioteca</h1>
        <div class="livros-lista" id="lista-containers">
            </div>
        <button onclick="navegarPara('setup')">Adicionar Novo Livro</button>
    </div>

    <div class="container hidden" id="setup-screen">
        <h1>Novo Propósito</h1>
        
        <div class="form-group">
            <label for="bookName">Título do Livro:</label>
            <input type="text" id="bookName" placeholder="Ex: Livro ou Meta Específica" required>
        </div>

        <div class="form-group">
            <label>Ritmo Diário:</label>
            <div class="radio-group">
                <input type="radio" id="ritmo50" name="ritmo" value="50" checked>
                <label for="ritmo50">50 Págs/Dia</label>
                
                <input type="radio" id="ritmo70" name="ritmo" value="70">
                <label for="ritmo70">70 Págs/Dia</label>
            </div>
        </div>

        <div class="form-group">
            <label for="inputType">Definir meta por:</label>
            <select id="inputType">
                <option value="pages">Total de Páginas do Livro</option>
                <option value="days">Total de Dias Desejados</option>
            </select>
            
            <input type="number" id="inputValue" placeholder="Ex: 350 páginas" required>
        </div>

        <button onclick="salvarNovoLivro()">Iniciar Nova Jornada</button>
        <button class="secondary" onclick="navegarPara('lista')">Cancelar</button>
    </div>

    <div class="container hidden" id="tracker-screen">
        <h2 id="tracker-title">Título do Livro</h2>
        <div class="progress-header" id="progress-text">
            Concluído: 0 / 0 dias
        </div>
        <div class="progress-bar">
            <div class="progress-fill" id="progress-fill"></div>
        </div>
        
        <div class="checklist" id="checklist">
            </div>

        <button class="secondary" onclick="navegarPara('lista')">Voltar para Biblioteca</button>
        <button class="danger" onclick="excluirLivroAtual()">Remover este Livro</button>
    </div>

    <script src="app.js"></script>
    <script>
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('sw.js');
        }
    </script>
</body>
</html>
