<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tracker de Leitura - Múltiplos Livros</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#1a202c">
    <style>
        :root {
            --primary: #f6ad55;
            --bg-glass: rgba(26, 32, 44, 0.85);
            --text: #e2e8f0;
            --danger: #e53e3e;
        }

        body {
            margin: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: url('https://static.vecteezy.com/system/resources/previews/071/820/601/large_2x/open-book-radiates-warm-light-illuminating-pages-with-magical-glow-on-a-wooden-table-symbolizing-knowledge-and-inspiration-photo.jpg') no-repeat center center fixed;
            background-size: cover;
            color: var(--text);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
            box-sizing: border-box;
        }

        .container {
            background: var(--bg-glass);
            backdrop-filter: blur(10px);
            padding: 2rem;
            border-radius: 12px;
            width: 100%;
            max-width: 500px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.5);
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-sizing: border-box;
        }

        h1, h2, h3 { text-align: center; margin-top: 0; }
        
        .hidden { display: none !important; }

        /* Estilos do Painel Diário */
        .daily-dashboard {
            background: rgba(246, 173, 85, 0.1);
            border: 1px solid var(--primary);
            padding: 1rem;
            border-radius: 8px;
            margin-bottom: 1.5rem;
            text-align: center;
        }

        .read-today {
            opacity: 0.4;
            border-left-color: #48bb78 !important;
            filter: grayscale(0.8);
            transition: all 0.3s ease;
        }
        
        .read-today::after {
            content: '✔ Lido Hoje';
            display: block;
            color: #48bb78;
            font-size: 0.8rem;
            font-weight: bold;
            margin-top: 5px;
        }

        /* Formulário de Setup */
        .form-group { margin-bottom: 1.5rem; }
        label { display: block; margin-bottom: 0.5rem; font-weight: bold; }
        
        .radio-group { display: flex; gap: 0.5rem; flex-wrap: wrap; }
        .radio-group label {
            flex: 1 1 calc(33.33% - 0.5rem);
            min-width: 100px;
            background: rgba(255, 255, 255, 0.1);
            padding: 0.8rem 0.5rem;
            text-align: center;
            border-radius: 8px;
            cursor: pointer;
            border: 2px solid transparent;
            transition: all 0.3s;
        }
        .radio-group input { display: none; }
        .radio-group input:checked + label {
            border-color: var(--primary);
            background: rgba(246, 173, 85, 0.2);
            color: var(--primary);
        }

        input[type="number"], input[type="text"], select {
            width: 100%;
            padding: 0.8rem;
            border-radius: 8px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            background: rgba(0, 0, 0, 0.3);
            color: white;
            box-sizing: border-box;
            font-size: 1rem;
            margin-bottom: 10px;
        }

        button {
            width: 100%;
            padding: 1rem;
            background-color: var(--primary);
            color: #1a202c;
            border: none;
            border-radius: 8px;
            font-size: 1.1rem;
            font-weight: bold;
            cursor: pointer;
            transition: opacity 0.3s;
            margin-bottom: 0.5rem;
        }
        button:hover { opacity: 0.9; }
        button.secondary { background-color: rgba(255, 255, 255, 0.2); color: white; }
        button.danger { background-color: var(--danger); color: white; }
        button.success { background-color: #48bb78; color: white; }

        /* Dashboard - Lista de Livros */
        .livros-lista {
            max-height: 380px;
            overflow-y: auto;
            margin-bottom: 1.5rem;
            padding-right: 5px;
        }
        .livros-lista::-webkit-scrollbar { width: 6px; }
        .livros-lista::-webkit-scrollbar-thumb { background: rgba(255, 255, 255, 0.3); border-radius: 3px; }

        .book-item {
            background: rgba(255, 255, 255, 0.05);
            padding: 1.2rem;
            border-radius: 8px;
            margin-bottom: 0.8rem;
            border-left: 4px solid var(--primary);
        }
        .book-info {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 0.8rem;
            gap: 10px;
        }
        .book-info > div:first-child {
            flex: 1;
            min-width: 0;
        }
        .book-title { font-weight: bold; font-size: 1.1rem; word-break: break-word; }
        .book-meta { font-size: 0.85rem; opacity: 0.7; word-break: break-word; }
        
        .book-actions {
            display: flex;
            gap: 0.5rem;
            flex-shrink: 0;
        }
        .book-actions button {
            padding: 0.6rem;
            font-size: 0.95rem;
            margin-bottom: 0;
        }

        /* Tela de Tracker Individual */
        .progress-header {
            text-align: center;
            margin-bottom: 1.5rem;
            font-size: 1.2rem;
        }
        .progress-bar {
            width: 100%;
            height: 10px;
            background: rgba(255, 255, 255, 0.2);
            border-radius: 5px;
            margin-bottom: 1.5rem;
            overflow: hidden;
        }
        .progress-fill {
            height: 100%;
            background: var(--primary);
            width: 0%;
            transition: width 0.3s ease;
        }

        .checklist {
            max-height: 320px;
            overflow-y: auto;
            padding-right: 5px;
            margin-bottom: 1.5rem;
        }
        .checklist::-webkit-scrollbar { width: 6px; }
        .checklist::-webkit-scrollbar-thumb { background: rgba(255, 255, 255, 0.3); border-radius: 3px; }

        .day-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 1rem;
            background: rgba(255, 255, 255, 0.05);
            margin-bottom: 0.5rem;
            border-radius: 8px;
            cursor: pointer;
            border-left: 4px solid transparent;
            transition: all 0.2s;
        }
        .day-item:hover { background: rgba(255, 255, 255, 0.1); }
        .day-item.done {
            border-left-color: var(--primary);
            background: rgba(246, 173, 85, 0.1);
            opacity: 0.8;
        }
        .day-item.done span { text-decoration: line-through; }
        
        .checkbox {
            width: 24px;
            height: 24px;
            border: 2px solid var(--text);
            border-radius: 4px;
            display: flex;
            justify-content: center;
            align-items: center;
            box-sizing: border-box;
        }
        
        .day-item.done-today {
            opacity: 0.3 !important;
            border-left-color: #48bb78 !important;
            background: rgba(72, 187, 120, 0.05) !important;
        }
        .day-item.done-today .checkbox::after {
            color: #48bb78 !important;
        }

        .day-item.done .checkbox::after {
            content: '✔';
            color: var(--primary);
            font-size: 1.2rem;
        }
        
        
        .history-box {
            background: rgba(0, 0, 0, 0.2);
            padding: 0.8rem;
            border-radius: 8px;
            margin-bottom: 1.5rem;
            font-size: 0.85rem;
            border-left: 3px solid #48bb78;
        }
        .history-item {
            margin-bottom: 0.3rem;
            opacity: 0.9;
        }
        .history-item:last-child {
            margin-bottom: 0;
        }

        .no-books {
            text-align: center;
            opacity: 0.6;
            padding: 2.5rem 0;
            font-style: italic;
        }
    </style>
</head>
<body>

    <div class="container" id="lista-screen">
        <h1>Minha Biblioteca</h1>
        
        <!-- PAINEL DE META DIÁRIA -->
        <div class="daily-dashboard">
            <h3 style="margin-bottom: 0.5rem; font-size: 1.1rem;">Meta de Hoje (75 Páginas)</h3>
            <div class="progress-header" style="margin-bottom: 0.5rem; font-size: 1rem;">
                Lido hoje: <span id="pages-today">0</span> / 75 páginas
            </div>
            <div class="progress-bar" style="margin-bottom: 1rem;">
                <div class="progress-fill" id="daily-progress-fill"></div>
            </div>
            <div id="daily-details" class="book-meta">Nenhuma leitura registrada hoje.</div>
        </div>

        <div class="livros-lista" id="lista-containers"></div>
        <button onclick="navegarPara('setup')">Adicionar Novo Livro</button>
    </div>

    <!-- TELA SETUP NOVO LIVRO -->
    <div class="container hidden" id="setup-screen">
        <h1>Novo Propósito</h1>
        
        <div class="form-group">
            <label for="bookName">Título do Livro:</label>
            <input type="text" id="bookName" placeholder="Ex: Livro ou Meta Específica" required>
        </div>

        <div class="form-group">
            <label>Ritmo Diário:</label>
            <div class="radio-group">
                <input type="radio" id="ritmo05" name="ritmo" value="5">
                <label for="ritmo05">05 Págs/Dia</label>
                <input type="radio" id="ritmo10" name="ritmo" value="10">
                <label for="ritmo10">10 Págs/Dia</label>
                <input type="radio" id="ritmo20" name="ritmo" value="20">
                <label for="ritmo20">20 Págs/Dia</label>
                <input type="radio" id="ritmo50" name="ritmo" value="50" checked>
                <label for="ritmo50">50 Págs/Dia</label>
                <input type="radio" id="ritmo70" name="ritmo" value="70">
                <label for="ritmo70">70 Págs/Dia</label>
            </div>
        </div>

        <div class="form-group">
            <label for="inputType">Definir meta por:</label>
            <select id="inputType">
                <option value="pages">Total de Páginas do Livro</option>
                <option value="days">Total de Dias Desejados</option>
            </select>
            <input type="number" id="inputValue" placeholder="Ex: 350 páginas" required>
        </div>

        <button onclick="salvarNovoLivro()">Iniciar Nova Jornada</button>
        <button class="secondary" onclick="navegarPara('lista')">Cancelar</button>
    </div>

    <!-- TELA DE EDIÇÃO -->
    <div class="container hidden" id="edit-screen">
        <h1>Editar Propósito</h1>
        <div class="form-group">
            <label for="editBookName">Título do Livro:</label>
            <input type="text" id="editBookName" placeholder="Ex: Livro ou Meta Específica" required>
        </div>
        <div class="form-group">
            <label>Ritmo Diário (Apenas para novos dias adicionados):</label>
            <div class="radio-group">
                <input type="radio" id="editRitmo05" name="editRitmo" value="5"><label for="editRitmo05">05 Págs</label>
                <input type="radio" id="editRitmo10" name="editRitmo" value="10"><label for="editRitmo10">10 Págs</label>
                <input type="radio" id="editRitmo20" name="editRitmo" value="20"><label for="editRitmo20">20 Págs</label>
                <input type="radio" id="editRitmo50" name="editRitmo" value="50"><label for="editRitmo50">50 Págs</label>
                <input type="radio" id="editRitmo70" name="editRitmo" value="70"><label for="editRitmo70">70 Págs</label>
            </div>
        </div>
        <div class="form-group">
            <label for="editInputType">Definir meta por:</label>
            <select id="editInputType">
                <option value="pages">Total de Páginas do Livro</option>
                <option value="days">Total de Dias Desejados</option>
            </select>
            <input type="number" id="editInputValue" placeholder="Ex: 350 páginas" required>
        </div>
        <button onclick="salvarEdicaoLivro()">Salvar Alterações</button>
        <button class="secondary" onclick="navegarPara('tracker')">Cancelar</button>
    </div>

    <!-- TELA LER NOVAMENTE (REINICIAR) -->
    <div class="container hidden" id="restart-screen">
        <h1>Ler Novamente</h1>
        <p style="text-align: center; margin-bottom: 1.5rem;">Você vai reiniciar o progresso de <strong><span id="restartBookName"></span></strong>. Defina o seu novo ritmo de leitura.</p>
        
        <div class="form-group">
            <label>Novo Ritmo Diário:</label>
            <div class="radio-group">
                <input type="radio" id="resRitmo05" name="resRitmo" value="5">
                <label for="resRitmo05">05 Págs</label>
                <input type="radio" id="resRitmo10" name="resRitmo" value="10">
                <label for="resRitmo10">10 Págs</label>
                <input type="radio" id="resRitmo20" name="resRitmo" value="20">
                <label for="resRitmo20">20 Págs</label>
                <input type="radio" id="resRitmo50" name="resRitmo" value="50">
                <label for="resRitmo50">50 Págs</label>
                <input type="radio" id="resRitmo70" name="resRitmo" value="70">
                <label for="resRitmo70">70 Págs</label>
            </div>
        </div>

        <button class="success" onclick="confirmarReiniciarLeitura()">Confirmar Novo Ciclo</button>
        <button class="secondary" onclick="navegarPara('tracker')">Cancelar</button>
    </div>

    <!-- TELA DO TRACKER -->
    <div class="container hidden" id="tracker-screen">
        <h2 id="tracker-title">Título do Livro</h2>
        <div class="progress-header" id="progress-text">Concluído: 0 / 0 dias</div>
        <div class="progress-bar">
            <div class="progress-fill" id="progress-fill"></div>
        </div>
        
        
        <div id="book-history" class="history-box hidden"></div>
        
        <div class="checklist" id="checklist"></div>

        <!-- Botão Principal -->
        <button class="secondary" onclick="navegarPara('lista')" style="margin-bottom: 0.5rem;">⬅ Voltar para Biblioteca</button>
        
        <!-- Botão para abrir/fechar opções -->
        <button class="secondary" onclick="toggleMenuOpcoes()" style="background-color: rgba(255, 255, 255, 0.05); border: 1px solid rgba(255,255,255,0.2);">⚙️ Mais Opções</button>

        <!-- Menu de Opções (Retraído por padrão) -->
        <div id="opcoes-menu" class="hidden" style="margin-top: 0.5rem; padding-top: 0.5rem; border-top: 1px dashed rgba(255,255,255,0.2);">
            <button class="success" onclick="abrirReiniciarLeitura()">Ler Novamente (Zerar)</button>
            <button class="secondary" onclick="abrirEdicaoLivro()">Editar Configurações</button>
            <button class="danger" onclick="limparHistoricoLivroAtual()" style="background-color: #718096; color: white;">Apagar Histórico Antigo</button>
            <button class="danger" onclick="excluirLivroAtual()">Remover este Livro</button>
        </div>
    </div>

    <script>
        // Lógica Principal
        let meusLivros = JSON.parse(localStorage.getItem('livrosTracker')) || [];
        let livroAtualIndex = null;

                function toggleMenuOpcoes() {
            document.getElementById('opcoes-menu').classList.toggle('hidden');
        }

        function salvarDados() {
            localStorage.setItem('livrosTracker', JSON.stringify(meusLivros));
        }

        function navegarPara(tela) {
            document.querySelectorAll('.container').forEach(el => el.classList.add('hidden'));
            document.getElementById(tela + '-screen').classList.remove('hidden');
            if (tela === 'lista') {
                renderListaLivros();
                atualizarMetaDiaria();
            }
        }

        function salvarNovoLivro() {
            const titulo = document.getElementById('bookName').value;
            const ritmo = parseInt(document.querySelector('input[name="ritmo"]:checked').value);
            const tipo = document.getElementById('inputType').value;
            const valor = parseInt(document.getElementById('inputValue').value);

            if(!titulo || !valor) return alert('Por favor, preencha todos os campos!');

            let totalDias = tipo === 'pages' ? Math.ceil(valor / ritmo) : valor;
            let dias = Array.from({length: totalDias}, () => ({ concluido: false, dataConclusao: null }));

            const dataInicio = new Date().toLocaleDateString('pt-BR');
            meusLivros.push({ titulo, ritmoDiario: ritmo, tipoMeta: tipo, valorMeta: valor, totalDias, dias, historico: [], dataInicio });
            salvarDados();
            navegarPara('lista');
            
            document.getElementById('bookName').value = '';
            document.getElementById('inputValue').value = '';
        }

        function renderListaLivros() {
            const container = document.getElementById('lista-containers');
            container.innerHTML = '';
            const hoje = new Date().toDateString();

            if (meusLivros.length === 0) {
                container.innerHTML = '<div class="no-books">Nenhum livro ou propósito criado ainda.</div>';
                return;
            }

            meusLivros.forEach((livro, index) => {
                let lidos = livro.dias.filter(d => d.concluido).length;
                let leuHoje = livro.dias.some(d => d.concluido && d.dataConclusao === hoje);
                
                const div = document.createElement('div');
                div.className = `book-item ${leuHoje ? 'read-today' : ''}`;
                
                let porcentagem = livro.totalDias > 0 ? Math.round((lidos / livro.totalDias) * 100) : 0;
                let dataInicioStr = livro.dataInicio || "Anterior";
                let diasRestantes = livro.totalDias - lidos;
                let previsaoData = new Date();
                previsaoData.setDate(previsaoData.getDate() + (diasRestantes > 0 ? diasRestantes : 0));
                let previsaoStr = previsaoData.toLocaleDateString('pt-BR');

                div.innerHTML = `
                    <div class="book-info">
                        <div>
                            <div class="book-title">${livro.titulo} <span style="font-size: 0.8rem; font-weight: normal; opacity: 0.8;">(${livro.ritmoDiario} págs/dia)</span></div>
                            <div class="book-meta" style="margin-top: 4px; line-height: 1.4;">
                                Concluído: ${lidos} / ${livro.totalDias} dias (${porcentagem}%)<br>
                                📅 Início: ${dataInicioStr} | 🎯 Término: ${previsaoStr}
                            </div>
                        </div>
                        <div class="book-actions">
                            <button onclick="abrirTracker(${index})">Abrir</button>
                        </div>
                    </div>
                `;
                container.appendChild(div);
            });
        }

        function atualizarMetaDiaria() {
            const META_GLOBAL = 75;
            let totalPaginasHoje = 0;
            let livrosLidosHoje = [];
            const hoje = new Date().toDateString();

            meusLivros.forEach(livro => {
                let leuEsteLivroHoje = false;
                livro.dias.forEach(dia => {
                    if (dia.concluido && dia.dataConclusao === hoje) {
                        totalPaginasHoje += parseInt(livro.ritmoDiario);
                        leuEsteLivroHoje = true;
                    }
                });

                if (leuEsteLivroHoje) {
                    livrosLidosHoje.push(livro.titulo);
                }
            });

            document.getElementById('pages-today').innerText = totalPaginasHoje;
            
            let porcentagem = (totalPaginasHoje / META_GLOBAL) * 100;
            if (porcentagem > 100) porcentagem = 100;
            
            const progressFill = document.getElementById('daily-progress-fill');
            progressFill.style.width = `${porcentagem}%`;
            
            if (totalPaginasHoje >= META_GLOBAL) {
                progressFill.style.background = '#48bb78'; 
            } else {
                progressFill.style.background = 'var(--primary)'; 
            }

            const detalhes = document.getElementById('daily-details');
            if (livrosLidosHoje.length > 0) {
                detalhes.innerText = `Atividades de hoje: ${livrosLidosHoje.join(', ')}`;
            } else {
                detalhes.innerText = "Nenhuma leitura registrada hoje.";
            }
        }

        function abrirTracker(index) {
            livroAtualIndex = index;
            navegarPara('tracker');
            renderTracker();
        }

        function renderTracker() {
            const livro = meusLivros[livroAtualIndex];

            

            document.getElementById('tracker-title').innerText = livro.titulo;
            
            const concluidos = livro.dias.filter(d => d.concluido).length;
            
            const dataInicioStr = livro.dataInicio || "Anterior";
            const diasRestantes = livro.totalDias - concluidos;
            const previsaoData = new Date();
            // A previsão é o dia de hoje + os dias que faltam marcar
            previsaoData.setDate(previsaoData.getDate() + (diasRestantes > 0 ? diasRestantes : 0));
            const previsaoStr = previsaoData.toLocaleDateString('pt-BR');
            
            let porcentagemTracker = livro.totalDias > 0 ? Math.round((concluidos / livro.totalDias) * 100) : 0;
            document.getElementById('progress-text').innerHTML = `
                <div>Concluído: ${concluidos} / ${livro.totalDias} dias (${porcentagemTracker}%)</div>
                <div style="font-size: 0.95rem; opacity: 0.9; margin-top: 5px; font-weight: normal; color: #e2e8f0;">
                    📅 Início: ${dataInicioStr} | 🎯 Término: ${previsaoStr}
                </div>
            `;

            
            document.getElementById('progress-fill').style.width = `${(concluidos / livro.totalDias) * 100}%`;

            document.getElementById('opcoes-menu').classList.add('hidden'); // Esconde o menu ao abrir a tela

            const historyBox = document.getElementById('book-history');
            if (livro.historico && livro.historico.length > 0) {
                historyBox.innerHTML = `<strong>Histórico de Leituras Anteriores:</strong><br>` + 
                    livro.historico.map((h, i) => 
                        `<div class="history-item">▶ Ciclo ${i + 1} encerrado em ${h.dataFim} (Ritmo: ${h.ritmoAntigo} págs/dia)</div>`
                    ).join('');
                historyBox.classList.remove('hidden');
            } else {
                historyBox.innerHTML = '';
                historyBox.classList.add('hidden');
            }


            const checklist = document.getElementById('checklist');
            checklist.innerHTML = '';
            
            const dataHojeTracker = new Date().toDateString();
            
            livro.dias.forEach((dia, diaIndex) => {
                const div = document.createElement('div');
                const isLidoHoje = dia.concluido && dia.dataConclusao === dataHojeTracker;
                div.className = `day-item ${dia.concluido ? 'done' : ''} ${isLidoHoje ? 'done-today' : ''}`;
                div.onclick = () => toggleDia(diaIndex);
                
                div.innerHTML = `
                    <span>Dia ${diaIndex + 1} (${livro.ritmoDiario} págs) <small style="color:#48bb78; text-decoration:none; font-size:0.75rem; margin-left:8px; display:${isLidoHoje ? 'inline' : 'none'};">✔ Lido Hoje</small></span>
                    <div class="checkbox"></div>
                `;
                checklist.appendChild(div);
            });
        }

        function toggleDia(diaIndex) {
            const livro = meusLivros[livroAtualIndex];

            

            const dia = livro.dias[diaIndex];
            
            dia.concluido = !dia.concluido;
            dia.dataConclusao = dia.concluido ? new Date().toDateString() : null;
            
            salvarDados();
            renderTracker();
        }

        
        function limparHistoricoLivroAtual() {
            if(confirm('Tem certeza que deseja limpar o histórico de leitura (ciclos antigos) deste livro? O progresso atual não será afetado.')) {
                meusLivros[livroAtualIndex].historico = [];
                salvarDados();
                renderTracker();
            }
        }

        function excluirLivroAtual() {
            if(confirm('Tem certeza que deseja remover este livro da sua lista?')) {
                meusLivros.splice(livroAtualIndex, 1);
                salvarDados();
                navegarPara('lista');
            }
        }

        function abrirEdicaoLivro() {
            const livro = meusLivros[livroAtualIndex];

            

            document.getElementById('editBookName').value = livro.titulo;
            document.querySelector(`input[name="editRitmo"][value="${livro.ritmoDiario}"]`).checked = true;
            document.getElementById('editInputType').value = livro.tipoMeta;
            document.getElementById('editInputValue').value = livro.valorMeta;
            
            navegarPara('edit');
        }

        function salvarEdicaoLivro() {
            const titulo = document.getElementById('editBookName').value;
            const ritmo = parseInt(document.querySelector('input[name="editRitmo"]:checked').value);
            const tipo = document.getElementById('editInputType').value;
            const valor = parseInt(document.getElementById('editInputValue').value);

            if(!titulo || !valor) return alert('Preencha os campos corretamente!');

            let totalDias = tipo === 'pages' ? Math.ceil(valor / ritmo) : valor;
            let dias = Array.from({length: totalDias}, (_, i) => {
                return meusLivros[livroAtualIndex].dias[i] || { concluido: false, dataConclusao: null };
            });

            meusLivros[livroAtualIndex] = { ...meusLivros[livroAtualIndex], titulo, ritmoDiario: ritmo, tipoMeta: tipo, valorMeta: valor, totalDias, dias };
            salvarDados();
            abrirTracker(livroAtualIndex);
        }

        // --- NOVA LÓGICA DE REINICIAR (LER NOVAMENTE) ---
        function abrirReiniciarLeitura() {
            const livro = meusLivros[livroAtualIndex];

            

            document.getElementById('restartBookName').innerText = livro.titulo;
            
            // Pré-seleciona o ritmo que já estava sendo usado
            const radio = document.querySelector(`input[name="resRitmo"][value="${livro.ritmoDiario}"]`);
            if (radio) radio.checked = true;
            
            navegarPara('restart');
        }

        function confirmarReiniciarLeitura() {
            const ritmo = parseInt(document.querySelector('input[name="resRitmo"]:checked').value);
            const livro = meusLivros[livroAtualIndex];

            // --- NOVO: SALVAR HISTÓRICO APENAS AO REINICIAR ---
            if (!livro.historico) livro.historico = [];
            const dataHoje = new Date().toLocaleDateString('pt-BR');
            const lidos = livro.dias.filter(d => d.concluido).length;
            
            // Só salva no histórico se houver progresso
            if (lidos > 0) {
                livro.historico.push({
                    dataFim: dataHoje,
                    diasLidos: lidos,
                    totalDiasAntigo: livro.totalDias,
                    ritmoAntigo: livro.ritmoDiario
                });
            }
            // ---------------------------------------------------


            

            
            // Recalcula a quantidade total de dias com base no novo ritmo escolhido
            let totalDias = livro.tipoMeta === 'pages' ? Math.ceil(livro.valorMeta / ritmo) : livro.valorMeta;
            
            // Cria um novo array de dias, totalmente limpo (zera o progresso)
            let dias = Array.from({length: totalDias}, () => ({ concluido: false, dataConclusao: null }));

            // Atualiza o livro no banco e salva
            const novaDataInicio = new Date().toLocaleDateString('pt-BR');
            meusLivros[livroAtualIndex] = { ...livro, ritmoDiario: ritmo, totalDias, dias, dataInicio: novaDataInicio };
            salvarDados();
            abrirTracker(livroAtualIndex);
        }

        document.addEventListener('DOMContentLoaded', () => {
            navegarPara('lista');
        });
        
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('sw.js').catch(err => console.log('SW falhou:', err));
        }
    </script>
</body>
</html>
